<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 210" width="100%" height="100%">
  <defs>
    <linearGradient id="window-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F2FE" />
      <stop offset="100%" stop-color="#BAE6FD" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="8" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Rocket Graphic Group -->
  <g transform="translate(126, 71) rotate(45)" filter="url(#shadow)">

    <!-- Sparks -->
    <circle cx="-35" cy="120" r="4" fill="#FBBF24" />
    <circle cx="30" cy="135" r="3" fill="#EF4444" />
    <circle cx="5" cy="165" r="5" fill="#F97316" />
    <circle cx="-45" cy="95" r="2.5" fill="#FBBF24" />
    <circle cx="45" cy="105" r="3.5" fill="#FBBF24" />
    <circle cx="-15" cy="150" r="3" fill="#EF4444" />
    <circle cx="20" cy="160" r="2" fill="#FBBF24" />

    <!-- Trailing Flames (drawn behind body and fins) -->
    <!-- Red Outer -->
    <path d="M -22,45 Q -35,100 0,150 Q 35,100 22,45 Z" fill="#EF4444" stroke="#1E293B" stroke-width="6" stroke-linejoin="round"/>
    <!-- Orange Middle -->
    <path d="M -14,48 Q -22,90 0,120 Q 22,90 14,48 Z" fill="#F97316" />
    <!-- Blue Inner -->
    <path d="M -7,48 Q -10,70 0,90 Q 10,70 7,48 Z" fill="#3B82F6" />

    <!-- Left Fin -->
    <path d="M -28,25 L -60,55 L -60,75 L -20,48 Z" fill="#3B82F6" stroke="#1E293B" stroke-width="6" stroke-linejoin="round"/>

    <!-- Right Fin -->
    <path d="M 28,25 L 60,55 L 60,75 L 20,48 Z" fill="#3B82F6" stroke="#1E293B" stroke-width="6" stroke-linejoin="round"/>

    <!-- Rocket Body -->
    <path d="M 0,-85 C 35,-35 32,20 32,50 L -32,50 C -32,20 -35,-35 0,-85 Z" fill="#FFFFFF" stroke="#1E293B" stroke-width="8" stroke-linejoin="round"/>

    <!-- Body Details -->
    <path d="M -23,-40 Q 0,-30 23,-40" fill="none" stroke="#1E293B" stroke-width="6" stroke-linecap="round"/>
    <path d="M -32,25 L 32,25" fill="none" stroke="#1E293B" stroke-width="6"/>
    <path d="M -32,40 L 32,40" fill="none" stroke="#1E293B" stroke-width="6"/>

    <!-- Window -->
    <circle cx="0" cy="-10" r="16" fill="url(#window-grad)" stroke="#1E293B" stroke-width="6"/>

    <!-- Window Reflection -->
    <path d="M -6,-20 Q 0,-24 6,-20" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>

  </g>
</svg>
